name: CI/CD Pipeline
run-name: ${{ github.workflow }} - ${{ github.head_ref || github.ref_name }}
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run backend syntax checks and tests
        run: |
          python -m compileall backend
          python -m pytest

  frontend:
    name: Frontend build and test
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Run frontend tests
        run: npm run test -- --watchAll=false
        working-directory: frontend
        env:
          CI: true
      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          CI: true
      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

  deploy:
    name: Deploy artifacts
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
      - name: Simulate deployment
        run: |
          echo "Backend and frontend passed CI and are ready for deployment."
          echo "Hook this step up to your cloud provider, container registry, or CD tooling."
